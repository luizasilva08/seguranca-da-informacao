<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Indústria 4.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #0d1117; color: white; }</style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center mt-5">
        <div class="col-md-4 card bg-dark p-4 border-secondary">
            <h3 class="text-center text-info mb-4">Acesso Indústria 4.0</h3>
            <label>Usuário</label>
            <input type="text" id="user" class="form-control mb-3">
            <label>Senha</label>
            <input type="password" id="pass" class="form-control mb-4">
            <button class="btn btn-info w-100" onclick="fazerLogin()">Entrar no Sistema</button>
            <p id="msg-erro" class="text-danger mt-3 text-center"></p>
        </div>
    </div>
</div>
<script>
    async function fazerLogin() {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value })
        });
        const data = await res.json();
        
        if(res.ok) { 
            window.location.href = data.redirect; // Vai direto para a aba do cargo!
        } else { 
            document.getElementById('msg-erro').innerText = "Credenciais inválidas!"; 
        }
    }
</script>
</body>
</html>
