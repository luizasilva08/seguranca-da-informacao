<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nexus Industrial - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #05070a; color: #ffffff; height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .login-box { background: #0f172a; border: 1px solid #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .btn-nexus { background: #38bdf8; color: #000; fw: 700; border: none; }
        .btn-nexus:hover { background: #0ea5e9; color: #fff; }
        input { background: #05070a !important; border: 1px solid #334155 !important; color: #fff !important; }
        label { color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 login-box text-center">
                <h2 class="mb-4" style="letter-spacing: -1px;">NEXUS<span style="color:#38bdf8">.UI</span></h2>
                <div class="text-start">
                    <label>ID de Operador</label>
                    <input type="text" id="user" class="form-control mb-3">
                    <label>Chave de Acesso</label>
                    <input type="password" id="pass" class="form-control mb-4">
                    <button class="btn btn-nexus w-100 py-2" onclick="fazerLogin()">AUTENTICAR SISTEMA</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function fazerLogin() {
            const res = await fetch('/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: document.getElementById('user').value, password: document.getElementById('pass').value})
            });
            const data = await res.json();
            if(res.ok) window.location.href = data.redirect;
            else alert("Acesso negado.");
        }
    </script>
</body>
</html>
