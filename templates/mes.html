<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MES | Controle de Manufatura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0b0f19; --panel-bg: #151b28; --border-color: #262f40; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .data-value { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.5px; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .panel-header { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; font-weight: 600; margin-bottom: 15px;}
        
        /* NOVO LAYOUT: PLANTA BAIXA DA FÁBRICA */
        .chao-de-fabrica-container {
            background-color: #1e2128;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }
        
        .planta-fabrica {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 30px;
            background-image: 
                linear-gradient(#2a2d35 1px, transparent 1px),
                linear-gradient(90deg, #2a2d35 1px, transparent 1px);
            background-size: 20px 20px;
            border: 2px solid #334155;
            border-radius: 8px;
        }
        
        .maquina-bloco {
            background-color: #151b28;
            border: 2px solid #334155;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .icone-maq { font-size: 3rem; margin-bottom: 15px; }
        .nome-maq { font-weight: 600; color: #f8fafc; font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 5px; }
        
        /* LUZ DE STATUS E ANIMAÇÃO */
        .status-luz {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin: 15px auto 10px auto;
            transition: all 0.3s ease;
        }
        .status-luz.verde { background-color: #10b981; box-shadow: 0 0 15px #10b981; }
        
        @keyframes piscar-emergencia {
            0% { background-color: #151b28; border-color: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.2); }
            50% { background-color: #450a0a; border-color: #ef4444; box-shadow: 0 0 30px rgba(239,68,68,0.8); }
            100% { background-color: #151b28; border-color: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.2); }
        }
        
        .em-alarme { animation: piscar-emergencia 1s infinite !important; }
        .em-alarme .status-luz { background-color: #ef4444 !important; box-shadow: 0 0 20px #ef4444 !important; }
        
        .tela-sirene { border: 2px solid #ef4444; animation: flash-bg 1s infinite; }
        @keyframes flash-bg { 50% { background-color: rgba(239, 68, 68, 0.1); } }
    </style>
</head>
<body>

<div class="container-fluid px-4 py-3">
    <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-2">
        <h5 class="text-warning m-0">📦 MES - Gestão de Produção e Equipamentos</h5>
        <a href="/logout" class="btn btn-outline-danger btn-sm">Sair</a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="panel text-center"><div class="panel-header">PRODUÇÃO (PEÇAS / META)</div><div class="data-value fs-2"><span id="pecas" class="text-success">--</span> / <span id="meta" class="text-muted">--</span></div></div></div>
        <div class="col-md-4"><div class="panel text-center" id="painel-oee"><div class="panel-header">OEE GLOBAL (EFICIÊNCIA)</div><div class="data-value fs-2 text-warning" id="oee">--%</div></div></div>
        <div class="col-md-4"><div class="panel text-center" id="painel-status"><div class="panel-header">STATUS DA LINHA</div><div class="data-value fs-3 text-info" id="status-linha">AGUARDANDO...</div></div></div>
    </div>

    <div class="chao-de-fabrica-container">
        <div class="panel-header mb-3" style="color: #cbd5e1;">📍 Planta Baixa - Visualização Espacial</div>
        <div class="planta-fabrica">
            
            <div id="maq-1" class="maquina-bloco">
                <div class="icone-maq">⚙️</div>
                <div class="nome-maq">FRESA CNC 5-EIXOS</div>
                <div id="luz-maq-1" class="status-luz verde"></div>
                <span id="texto-maq-1" class="badge bg-success mt-2">Rodando</span>
            </div>

            <div id="maq-2" class="maquina-bloco">
                <div class="icone-maq">🦾</div>
                <div class="nome-maq">ROBÔ DE SOLDA</div>
                <div id="luz-maq-2" class="status-luz verde"></div>
                <span id="texto-maq-2" class="badge bg-success mt-2">Rodando</span>
            </div>

            <div id="maq-3" class="maquina-bloco">
                <div class="icone-maq">🛤️</div>
                <div class="nome-maq">ESTEIRA DE INSPEÇÃO</div>
                <div id="luz-maq-3" class="status-luz verde"></div>
                <span id="texto-maq-3" class="badge bg-success mt-2">Rodando</span>
            </div>

        </div>
    </div>
</div>

<script>
    setInterval(async () => {
        try {
            const res = await fetch('/api/mes');
            const data = await res.json();
            
            document.getElementById('pecas').innerText = data.pecas_produzidas;
            document.getElementById('meta').innerText = data.meta;
            document.getElementById('oee').innerText = data.oee.toFixed(1) + "%";
            
            const painelStatus = document.getElementById('painel-status');
            const txtStatus = document.getElementById('status-linha');

            // Controlo do Alarme Geral do Painel Superior
            if (data.alarme_ativo) {
                painelStatus.className = "panel text-center tela-sirene";
                txtStatus.className = "data-value fs-3 text-danger";
                txtStatus.innerText = "PARADA GERAL (ALARME)";
            } else {
                painelStatus.className = "panel text-center";
                txtStatus.className = "data-value fs-3 text-success";
                txtStatus.innerText = "OPERAÇÃO CONTÍNUA";
            }

            // A LÓGICA CORRIGIDA: Adiciona e REMOVE o alarme dinamicamente das máquinas
            data.maquinas.forEach((m, index) => {
                const num = index + 1;
                const maqBloco = document.getElementById('maq-' + num);
                const luzMaq = document.getElementById('luz-maq-' + num);
                const textoMaq = document.getElementById('texto-maq-' + num);
                
                textoMaq.innerText = m.status;
                textoMaq.className = `badge bg-${m.cor} mt-2`;

                if (data.alarme_ativo) {
                    // Liga o Alarme
                    maqBloco.classList.add('em-alarme');
                    luzMaq.classList.remove('verde');
                } else {
                    // Desliga o Alarme e restaura ao estado normal
                    maqBloco.classList.remove('em-alarme');
                    luzMaq.classList.add('verde');
                }
            });
        } catch(e) {
            console.error("Erro na atualização do MES:", e);
        }
    }, 2000);
</script>
</body>
</html>
