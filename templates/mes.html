<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MES Production Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: #ffffff; font-family: 'Inter', sans-serif; }
        .side-panel { background: #0f172a; border-right: 1px solid #1e293b; height: 100vh; padding: 20px; }
        .main-content { padding: 30px; height: 100vh; overflow-y: auto; }
        .kpi-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
        .machine-status { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .oee-val { font-size: 3rem; font-weight: 900; color: #10b981; }
        .progress { height: 8px; background: #334155; }
        .progress-bar { background: #38bdf8; }
        h6 { color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 side-panel">
                <h4 class="fw-bold mb-4">MES CENTRAL</h4>
                <div id="alertas" class="mt-5">
                    <h6>Notificações de Chão</h6>
                    </div>
            </div>
            <div class="col-md-9 main-content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>Dashboard de Performance</h3>
                    <a href="/logout" class="btn btn-sm btn-outline-danger">Logoff</a>
                </div>

                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="kpi-card text-center">
                            <h6>Eficiência Global (OEE)</h6>
                            <div class="oee-val" id="oee-g">--%</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="kpi-card">
                            <div class="d-flex justify-content-between">
                                <h6>Produção da Ordem #409</h6>
                                <span id="prod-txt" class="fw-bold">-- / --</span>
                            </div>
                            <div class="progress mt-3">
                                <div id="prod-bar" class="progress-bar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <h5 class="mt-5 mb-3">Mapa de Ativos (Real-time)</h5>
                <div class="row g-3" id="maq-grid">
                    </div>
            </div>
        </div>
    </div>
    <script>
        async function load() {
            const res = await fetch('/api/mes_data');
            const d = await res.json();
            
            document.getElementById('oee-g').innerText = d.oee.global + "%";
            document.getElementById('prod-txt').innerText = `${d.producao.atual} / ${d.producao.meta}`;
            document.getElementById('prod-bar').style.width = (d.producao.atual / d.producao.meta * 100) + "%";

            document.getElementById('maq-grid').innerHTML = d.maquinas.map(m => `
                <div class="col-md-3">
                    <div class="machine-status">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold">${m.id}</span>
                            <span class="badge ${m.status=='Ativa'?'bg-success':'bg-danger'}">${m.status}</span>
                        </div>
                        <div class="mt-3 small text-muted">Carga: ${m.load}%</div>
                        <div class="progress mt-1" style="height:4px"><div class="progress-bar" style="width:${m.load}%"></div></div>
                    </div>
                </div>
            `).join('');

            document.getElementById('alertas').innerHTML = '<h6>Notificações</h6>' + d.alertas.map(a => `
                <div class="alert alert-dark p-2" style="font-size:0.8rem; background:#1e293b; border:none; color:#fff">⚠️ ${a}</div>
            `).join('');
        }
        setInterval(load, 3000);
        load();
    </script>
</body>
</html>
