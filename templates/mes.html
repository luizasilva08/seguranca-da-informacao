<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nexus MES | Gestão de Fábrica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: #ffffff; font-family: 'Inter', sans-serif; }
        .sidebar { background: #0f172a; border-right: 1px solid #1e293b; height: 100vh; padding: 25px; }
        .kpi-box { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; height: 100%; }
        .oee-number { font-size: 3.5rem; font-weight: 900; color: #10b981; line-height: 1; }
        .machine-card { background: #0f172a; border-radius: 8px; border: 1px solid #1e293b; padding: 15px; }
        .progress { background: #020617; height: 6px; }
        .text-label { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <h5 class="fw-bold text-primary mb-5">NEXUS MES</h5>
                <nav class="nav flex-column gap-3">
                    <a href="#" class="nav-link text-white active fw-bold">DASHBOARD</a>
                    <a href="#" class="nav-link text-secondary">ORDENS</a>
                    <a href="#" class="nav-link text-secondary">QUALIDADE</a>
                    <hr class="border-secondary">
                    <a href="/logout" class="nav-link text-danger">LOGOUT</a>
                </nav>
            </div>
            <div class="col-md-10 p-5">
                <div class="row g-4 mb-5">
                    <div class="col-md-4">
                        <div class="kpi-box text-center">
                            <span class="text-label">Eficiência Global (OEE)</span>
                            <div class="oee-number mt-2" id="oee-val">--%</div>
                            <div class="d-flex justify-content-around mt-4 small text-secondary">
                                <div>D: <span class="text-white" id="oee-d">--</span>%</div>
                                <div>P: <span class="text-white" id="oee-p">--</span>%</div>
                                <div>Q: <span class="text-white" id="oee-q">--</span>%</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="kpi-box">
                            <div class="d-flex justify-content-between align-items-end">
                                <div>
                                    <span class="text-label">Status da Ordem #409</span>
                                    <h3 class="fw-bold mt-1">Eixo de Transmissão V8</h3>
                                </div>
                                <div class="text-end">
                                    <span class="text-label">Progresso</span>
                                    <h4 id="prod-txt" class="fw-bold">-- / --</h4>
                                </div>
                            </div>
                            <div class="progress mt-3">
                                <div id="prod-bar" class="progress-bar bg-primary" style="width: 70%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <h5 class="fw-bold mb-4">MÁQUINAS DA LINHA A</h5>
                <div class="row g-3" id="maq-grid"></div>
            </div>
        </div>
    </div>

    <script>
        async function refresh() {
            const res = await fetch('/api/mes_data');
            const d = await res.json();
            
            document.getElementById('oee-val').innerText = d.kpis.oee + "%";
            document.getElementById('oee-d').innerText = d.kpis.disponibilidade;
            document.getElementById('oee-p').innerText = d.kpis.performance;
            document.getElementById('oee-q').innerText = d.kpis.qualidade;
            document.getElementById('prod-txt').innerText = `${d.producao.boas} / ${d.producao.meta}`;
            document.getElementById('prod-bar').style.width = (d.producao.boas / d.producao.meta * 100) + "%";

            document.getElementById('maq-grid').innerHTML = d.status_maquinas.map(m => `
                <div class="col-md-3">
                    <div class="machine-card">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold text-white">${m.tag}</span>
                            <span class="badge bg-${m.cor} border-0" style="font-size:0.6rem">${m.status}</span>
                        </div>
                        <div class="mt-3">
                            <span class="text-label" style="font-size:0.6rem">Eficiência Individual</span>
                            <div class="fs-4 fw-bold text-white">${m.eficiencia}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        setInterval(refresh, 3000);
        refresh();
    </script>
</body>
</html>
