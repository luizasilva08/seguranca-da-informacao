<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MES | Planta Fabril</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0b0f19; --panel-bg: #151b28; --border-color: #262f40; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .topbar { background: var(--panel-bg); border-bottom: 1px solid var(--border-color); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* PLANTA BAIXA DA FÁBRICA CSS */
        .factory-floor { border: 2px dashed #475569; padding: 15px; border-radius: 8px; background: #070a11; position: relative; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 15px; }
        .factory-zone { border: 1px solid #334155; border-radius: 6px; padding: 15px; background: rgba(30, 41, 59, 0.3); }
        .zone-title { font-size: 0.75rem; text-transform: uppercase; color: #64748b; letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        
        .machine-block { background: #1e293b; border: 1px solid; border-radius: 6px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin-bottom: 10px; transition: all 0.3s; }
        .machine-icon { font-size: 1.5rem; margin-bottom: 5px; }
        
        .status-success { border-color: #10b981; box-shadow: inset 0 0 10px rgba(16, 185, 129, 0.2); }
        .status-success .machine-icon { color: #10b981; }
        .status-warning { border-color: #f59e0b; box-shadow: inset 0 0 10px rgba(245, 158, 11, 0.2); }
        .status-warning .machine-icon { color: #f59e0b; }
        .status-danger { border-color: #ef4444; box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.2); animation: piscar-erro 1s infinite; }
        .status-danger .machine-icon { color: #ef4444; }
        
        @keyframes piscar-erro { 0% { opacity: 1; } 50% { opacity: 0.5; background: rgba(239,68,68,0.2); } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="topbar mb-3">
    <div class="fw-bold text-warning"><i class="bi bi-kanban me-2"></i>MES | SISTEMA DE EXECUÇÃO DA MANUFATURA</div>
    <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="bi bi-power"></i> Sair</a>
</div>

<div class="container-fluid px-4">
    <div class="row g-3 mb-4">
        <div class="col"><div class="panel text-center"><small class="text-secondary">PRODUTO</small><h5 class="m-0 mt-1 text-info" id="prod">--</h5></div></div>
        <div class="col"><div class="panel text-center"><small class="text-secondary">OEE GLOBAL</small><h5 class="m-0 mt-1 text-warning" id="oee">--</h5></div></div>
        <div class="col"><div class="panel text-center"><small class="text-secondary">PEÇAS / META</small><h5 class="m-0 mt-1 text-success"><span id="pecas">--</span> / <span id="meta" class="text-muted">--</span></h5></div></div>
    </div>

    <div class="row g-4">
        <div class="col-xl-9">
            <div class="panel h-100">
                <h6 class="mb-4 text-secondary"><i class="bi bi-map"></i> PLANTA BAIXA - GALPÃO A (LAYT-01)</h6>
                
                <div class="factory-floor">
                    <div class="factory-zone">
                        <div class="zone-title">ZONA DE USINAGEM (CNC)</div>
                        <div class="row" id="zona-usinagem"></div>
                    </div>
                    
                    <div class="factory-zone">
                        <div class="zone-title">ZONA DE SOLDA / MONTAGEM</div>
                        <div class="row" id="zona-solda"></div>
                    </div>
                    
                    <div class="factory-zone" style="grid-column: span 2;">
                        <div class="zone-title">LINHA DE INSPEÇÃO E ESTEIRA FINAL</div>
                        <div class="row" id="zona-inspecao"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-3">
            <div class="panel h-100">
                <h6 class="text-secondary mb-3"><i class="bi bi-megaphone"></i> Log de Produção</h6>
                <div id="lista-avisos" style="font-size: 0.85rem;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    setInterval(async () => {
        const res = await fetch('/api/mes');
        const data = await res.json();
        
        document.getElementById('prod').innerText = data.produto;
        document.getElementById('oee').innerText = data.oee.toFixed(1) + "%";
        document.getElementById('pecas').innerText = data.pecas_produzidas;
        document.getElementById('meta').innerText = data.meta;

        // Distribui as máquinas do app.py para as zonas corretas da planta
        const usinagem = [], solda = [], inspecao = [];
        data.maquinas.forEach(m => {
            let icon = 'bi-gear-wide-connected';
            if(m.nome.includes('Fresa') || m.nome.includes('Torno')) usinagem.push(m);
            else if(m.nome.includes('Solda')) { solda.push(m); icon = 'bi-fire'; }
            else { inspecao.push(m); icon = 'bi-search'; }
        });

        const renderMachine = (m, icon) => `
            <div class="col-6">
                <div class="machine-block status-${m.cor}">
                    <i class="bi ${m.nome.includes('Solda') ? 'bi-fire' : (m.nome.includes('Insp') ? 'bi-search' : 'bi-gear-wide-connected')} machine-icon"></i>
                    <strong class="small">${m.nome}</strong>
                    <span class="badge bg-${m.cor} mt-1">${m.status}</span>
                </div>
            </div>`;

        document.getElementById('zona-usinagem').innerHTML = usinagem.map(m => renderMachine(m)).join('');
        document.getElementById('zona-solda').innerHTML = solda.map(m => renderMachine(m)).join('');
        document.getElementById('zona-inspecao').innerHTML = inspecao.map(m => renderMachine(m)).join('');

        document.getElementById('lista-avisos').innerHTML = data.avisos.map(a => `
            <div class="mb-2 p-2 rounded" style="background: rgba(255,255,255,0.05); border-left: 2px solid #f59e0b;">${a}</div>
        `).join('');
    }, 3000);
</script>
</body>
</html>
