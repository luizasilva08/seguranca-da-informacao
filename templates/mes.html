<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MES | Controle de Manufatura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0b0f19; --panel-bg: #151b28; --border-color: #262f40; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .data-value { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.5px; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .panel-header { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; font-weight: 600; margin-bottom: 15px;}
        
        /* DESENHO DAS MÁQUINAS */
        .maquina-desenho { background: #070a11; border: 2px solid #334155; border-radius: 10px; padding: 20px; text-align: center; position: relative; transition: all 0.3s;}
        
        /* CNC / Engrenagens */
        .gear-container { width: 60px; height: 60px; margin: 0 auto 15px; border-radius: 50%; border: 4px dashed #64748b; display: flex; align-items: center; justify-content: center; }
        .gear-inner { width: 30px; height: 30px; background: #38bdf8; border-radius: 50%; box-shadow: 0 0 15px #38bdf8; }
        .rodando .gear-container { animation: spin 4s linear infinite; border-color: #10b981; }
        .rodando .gear-inner { background: #10b981; box-shadow: 0 0 15px #10b981;}
        
        /* Esteira / Rolamentos */
        .conveyor { width: 100px; height: 20px; background: #334155; margin: 20px auto; border-radius: 10px; display: flex; justify-content: space-around; align-items: center; padding: 0 5px;}
        .roller { width: 12px; height: 12px; background: #64748b; border-radius: 50%; }
        .rodando .roller { background: #10b981; animation: bounce 0.5s infinite alternate; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes bounce { to { transform: translateY(-3px); } }

        /* Estado de Alarme GERAL do MES */
        .maquina-alarme { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .maquina-alarme .gear-container { border-color: #ef4444; animation: none; }
        .maquina-alarme .gear-inner { background: #ef4444; box-shadow: 0 0 15px #ef4444; }
        .maquina-alarme .roller { background: #ef4444; animation: none; }
        
        .tela-sirene { border: 2px solid #ef4444; animation: flash-bg 1s infinite; }
        @keyframes flash-bg { 50% { background-color: rgba(239, 68, 68, 0.1); } }
    </style>
</head>
<body>

<div class="container-fluid px-4 py-3">
    <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-2">
        <h5 class="text-warning m-0">📦 MES - Gestão de Produção e Equipamentos</h5>
        <a href="/logout" class="btn btn-outline-danger btn-sm">Sair</a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="panel text-center"><div class="panel-header">PRODUÇÃO (PEÇAS / META)</div><div class="data-value fs-2"><span id="pecas" class="text-success">--</span> / <span id="meta" class="text-muted">--</span></div></div></div>
        <div class="col-md-4"><div class="panel text-center" id="painel-oee"><div class="panel-header">OEE GLOBAL (EFICIÊNCIA)</div><div class="data-value fs-2 text-warning" id="oee">--%</div></div></div>
        <div class="col-md-4"><div class="panel text-center" id="painel-status"><div class="panel-header">STATUS DA LINHA</div><div class="data-value fs-3 text-info" id="status-linha">AGUARDANDO...</div></div></div>
    </div>

    <div class="panel h-100">
        <div class="panel-header">CHÃO DE FÁBRICA - SUPERVISÃO DE MÁQUINAS</div>
        <div class="row g-4" id="grid-maquinas">
            
            <div class="col-md-4">
                <div class="maquina-desenho rodando" id="maq-1">
                    <div class="gear-container"><div class="gear-inner"></div></div>
                    <h5 class="text-light">FRESA CNC 5-EIXOS</h5>
                    <span class="badge" id="badge-1">Rodando</span>
                </div>
            </div>

            <div class="col-md-4">
                <div class="maquina-desenho rodando" id="maq-2">
                    <div style="font-size: 3rem; color: #38bdf8;" id="icone-2">🦾</div>
                    <h5 class="text-light">ROBÔ DE SOLDA</h5>
                    <span class="badge" id="badge-2">Rodando</span>
                </div>
            </div>

            <div class="col-md-4">
                <div class="maquina-desenho rodando" id="maq-3">
                    <div class="conveyor"><div class="roller"></div><div class="roller"></div><div class="roller"></div></div>
                    <h5 class="text-light">ESTEIRA DE INSPEÇÃO</h5>
                    <span class="badge" id="badge-3">Rodando</span>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    setInterval(async () => {
        const res = await fetch('/api/mes');
        const data = await res.json();
        
        document.getElementById('pecas').innerText = data.pecas_produzidas;
        document.getElementById('meta').innerText = data.meta;
        document.getElementById('oee').innerText = data.oee.toFixed(1) + "%";
        
        const painelStatus = document.getElementById('painel-status');
        const txtStatus = document.getElementById('status-linha');

        if (data.alarme_ativo) {
            painelStatus.className = "panel text-center tela-sirene";
            txtStatus.className = "data-value fs-3 text-danger";
            txtStatus.innerText = "PARADA GERAL (ALARME SCADA)";
        } else {
            painelStatus.className = "panel text-center";
            txtStatus.className = "data-value fs-3 text-success";
            txtStatus.innerText = "OPERAÇÃO CONTÍNUA";
        }

        // Aplica o status visual (cores e animações) em cada desenho de máquina
        data.maquinas.forEach((m, index) => {
            const num = index + 1;
            const card = document.getElementById('maq-' + num);
            const badge = document.getElementById('badge-' + num);
            
            badge.innerText = m.status;
            badge.className = `badge bg-${m.cor} fs-6 mt-2`;

            if (data.alarme_ativo) {
                card.className = "maquina-desenho maquina-alarme";
                if(num === 2) document.getElementById('icone-2').style.color = "#ef4444"; // Robô vermelho
            } else {
                card.className = "maquina-desenho rodando";
                if(num === 2) document.getElementById('icone-2').style.color = "#10b981"; // Robô verde
            }
        });

    }, 2000);
</script>
</body>
</html>
