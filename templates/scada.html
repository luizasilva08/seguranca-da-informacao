<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nexus SCADA | Terminal HMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #05070a; color: #ffffff; font-family: 'Inter', sans-serif; }
        .hmi-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 25px; }
        .val-display { font-size: 2.8rem; font-weight: 800; color: #ffffff; line-height: 1; }
        .unit { font-size: 1rem; color: #64748b; font-weight: 400; margin-left: 5px; }
        .label-tag { color: #38bdf8; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        .alarme-ativo { border-color: #ef4444 !important; background: linear-gradient(180deg, #0f172a 0%, #450a0a 100%) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container-fluid p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">PROCESS MONITOR <span class="text-secondary fs-6">// LINE_01</span></h4>
            <a href="/logout" class="btn btn-sm btn-outline-danger">TERMINAL LOGOFF</a>
        </div>

        <div class="row g-4">
            <div class="col-md-3">
                <div id="card-temp" class="hmi-card">
                    <span class="label-tag">TEMPERATURA NÚCLEO</span>
                    <div class="val-display my-2" id="v-temp">--<span class="unit">°C</span></div>
                    <canvas id="g-temp" height="100"></canvas>
                </div>
            </div>
            <div class="col-md-3">
                <div class="hmi-card">
                    <span class="label-tag">PRESSÃO HIDRÁULICA</span>
                    <div class="val-display my-2" id="v-pres">--<span class="unit">bar</span></div>
                    <canvas id="g-pres" height="100"></canvas>
                </div>
            </div>
            <div class="col-md-3">
                <div class="hmi-card">
                    <span class="label-tag">VAZÃO DE REFRIGERANTE</span>
                    <div class="val-display my-2" id="v-vaz">--<span class="unit">L/m</span></div>
                    <canvas id="g-vaz" height="100"></canvas>
                </div>
            </div>
            <div class="col-md-3">
                <div class="hmi-card">
                    <span class="label-tag">NÍVEL TANQUE 01</span>
                    <div class="val-display my-2" id="v-niv">--<span class="unit">%</span></div>
                    <canvas id="g-niv" height="100"></canvas>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="hmi-card border-warning">
                    <span class="label-tag text-warning">CONFIGURAÇÃO DE SETPOINT</span>
                    <div class="input-group mt-3">
                        <input type="number" id="setp" class="form-control bg-dark border-secondary text-white" placeholder="Limite de Alarme">
                        <button class="btn btn-warning fw-bold" onclick="salvar()">ATUALIZAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function initChart(id, color) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: Array(20).fill(''), datasets: [{ data: [], borderColor: color, borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: color+'22', tension: 0.4 }] },
                options: { animation: false, scales: { x: {display: false}, y: {display: false} }, plugins: {legend: {display: false}} }
            });
        }
        const charts = { temp: initChart('g-temp', '#38bdf8'), pres: initChart('g-pres', '#10b981'), vaz: initChart('g-vaz', '#f59e0b'), niv: initChart('g-niv', '#a855f7') };

        async function tick() {
            const res = await fetch('/api/scada_data');
            const d = (await res.json()).maquina_01;
            
            document.getElementById('v-temp').innerHTML = `${d.temp}<span class="unit">°C</span>`;
            document.getElementById('v-pres').innerHTML = `${d.pressao}<span class="unit">bar</span>`;
            document.getElementById('v-vaz').innerHTML = `${d.vazao}<span class="unit">L/m</span>`;
            document.getElementById('v-niv').innerHTML = `${d.nivel}<span class="unit">%</span>`;

            const card = document.getElementById('card-temp');
            if(d.alarme) card.classList.add('alarme-ativo'); else card.classList.remove('alarme-ativo');

            Object.keys(charts).forEach(k => {
                const val = k === 'temp' ? d.temp : k === 'pres' ? d.pressao : k === 'vaz' ? d.vazao : d.nivel;
                charts[k].data.datasets[0].data.push(val);
                if(charts[k].data.datasets[0].data.length > 20) charts[k].data.datasets[0].data.shift();
                charts[k].update();
            });
        }
        setInterval(tick, 2000);
        async function salvar() {
            await fetch('/api/setpoint', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({valor: document.getElementById('setp').value}) });
            alert("Sistema Atualizado");
        }
    </script>
</body>
</html>
