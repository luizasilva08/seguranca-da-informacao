<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>HMI SCADA | Caldeira Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-dark: #0b0f19; --panel-bg: #151b28; --border-color: #262f40; --text-main: #f8fafc; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; }
        .data-value { font-family: 'JetBrains Mono', monospace; }
        .topbar { background: var(--panel-bg); border-bottom: 1px solid var(--border-color); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .chart-container { position: relative; height: 180px; width: 100%; }
        .metric-header { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; font-weight: 600; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .live-dot { height: 8px; width: 8px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .estado-alarme { border-color: #ef4444 !important; box-shadow: inset 0 0 20px rgba(239,68,68,0.1) !important; }
    </style>
</head>
<body>

<div class="topbar mb-3">
    <div class="fw-bold text-info"><i class="bi bi-cpu-fill me-2"></i>SCADA VIEW | MONITORAMENTO MULTI-VARIÁVEL</div>
    <div class="d-flex align-items-center gap-3">
        <div class="d-flex align-items-center gap-2"><div class="live-dot"></div> <span class="small text-secondary fw-bold">ONLINE</span></div>
        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="bi bi-power"></i> Sair</a>
    </div>
</div>

<div class="container-fluid px-4">
    <div class="row g-3">
        <div class="col-md-8">
            <div id="card-temp" class="panel h-100">
                <div class="metric-header"><span class="text-info"><i class="bi bi-thermometer-high"></i> Temperatura (°C)</span> <span id="status-temp" class="badge bg-success">Normal</span></div>
                <div class="d-flex justify-content-between mb-2">
                    <div class="data-value fs-2 fw-bold" id="val-temp">--</div>
                    <div class="text-end">
                        <small class="text-secondary">Setpoint</small><br>
                        <span class="data-value text-warning fw-bold" id="val-limite">--</span>
                    </div>
                </div>
                <div class="chart-container"><canvas id="chartTemp"></canvas></div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="panel border-warning border-opacity-50 h-100 d-flex flex-column justify-content-center">
                <h6 class="text-warning mb-3"><i class="bi bi-sliders"></i> Ajuste de Setpoint Térmico</h6>
                <p class="small text-secondary mb-3">Altere o limite máximo de temperatura para disparar o alarme da caldeira.</p>
                <div class="input-group">
                    <input type="number" id="input-setpoint" class="form-control bg-dark text-white border-secondary data-value" placeholder="Novo limite...">
                    <button class="btn btn-warning fw-bold" onclick="alterarSetpoint()">Aplicar</button>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="panel">
                <div class="metric-header"><span class="text-primary"><i class="bi bi-speedometer2"></i> Pressão Interna (bar)</span></div>
                <div class="data-value fs-3 fw-bold mb-2 text-primary" id="val-pressao">--</div>
                <div class="chart-container"><canvas id="chartPressao"></canvas></div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="panel">
                <div class="metric-header"><span class="text-success"><i class="bi bi-water"></i> Vazão de Fluido (L/min)</span></div>
                <div class="data-value fs-3 fw-bold mb-2 text-success" id="val-vazao">--</div>
                <div class="chart-container"><canvas id="chartVazao"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
    Chart.defaults.color = '#64748b';
    Chart.defaults.font.family = 'JetBrains Mono';
    const chartOptions = { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { grid: { color: '#1e293b' } } }, plugins: { legend: { display: false } } };

    const ctxTemp = document.getElementById('chartTemp').getContext('2d');
    const chartTemp = new Chart(ctxTemp, { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#0ea5e9', backgroundColor: 'rgba(14, 165, 233, 0.1)', fill: true, tension: 0.3 }] }, options: chartOptions });

    const ctxPress = document.getElementById('chartPressao').getContext('2d');
    const chartPress = new Chart(ctxPress, { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', tension: 0.3 }] }, options: chartOptions });

    const ctxVazao = document.getElementById('chartVazao').getContext('2d');
    const chartVazao = new Chart(ctxVazao, { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#10b981', tension: 0.3 }] }, options: chartOptions });

    setInterval(async () => {
        const res = await fetch('/api/monitoramento');
        const data = await res.json();
        const time = new Date().toLocaleTimeString();
        
        document.getElementById('val-temp').innerText = data.temperatura.toFixed(1);
        document.getElementById('val-limite').innerText = data.limite.toFixed(1) + ' °C';
        document.getElementById('val-pressao').innerText = data.pressao.toFixed(2);
        document.getElementById('val-vazao').innerText = data.vazao.toFixed(1);

        const cardTemp = document.getElementById('card-temp');
        const badgeTemp = document.getElementById('status-temp');
        if (data.alarme) {
            cardTemp.classList.add('estado-alarme');
            badgeTemp.className = "badge bg-danger"; badgeTemp.innerText = "SOBREAQUECIMENTO";
            chartTemp.data.datasets[0].borderColor = '#ef4444'; chartTemp.data.datasets[0].backgroundColor = 'rgba(239, 68, 68, 0.1)';
        } else {
            cardTemp.classList.remove('estado-alarme');
            badgeTemp.className = "badge bg-success"; badgeTemp.innerText = "Normal";
            chartTemp.data.datasets[0].borderColor = '#0ea5e9'; chartTemp.data.datasets[0].backgroundColor = 'rgba(14, 165, 233, 0.1)';
        }

        const updateChart = (chart, val) => {
            chart.data.labels.push(time); chart.data.datasets[0].data.push(val);
            if(chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
            chart.update();
        };

        updateChart(chartTemp, data.temperatura);
        updateChart(chartPress, data.pressao);
        updateChart(chartVazao, data.vazao);
    }, 2000);

    async function alterarSetpoint() {
        const val = document.getElementById('input-setpoint').value;
        if(!val) return;
        await fetch('/api/setpoint', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ valor: val }) });
        document.getElementById('input-setpoint').value = '';
    }
</script>
</body>
</html>
