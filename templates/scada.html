<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SCADA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>body { background-color: #0d1117; color: white; } .card { background-color: #161b22; border: 1px solid #30363d; }</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand text-info">SCADA - Chão de Fábrica</span>
        <div>
            <span class="navbar-text me-3 text-warning">Operador</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Sair</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-8 card p-3">
            <h4>Temperatura: <span id="temp" class="text-info">--</span></h4>
            <canvas id="grafico" height="100"></canvas>
        </div>
        <div class="col-md-4">
            <div class="card p-3 mb-3 border-warning">
                <h5 class="text-warning">Configurar Alarme</h5>
                <input type="number" id="val-setpoint" class="form-control mb-2" placeholder="Ex: 185">
                <button class="btn btn-warning" onclick="alterarSetpoint()">Aplicar Limite</button>
            </div>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('grafico').getContext('2d');
    const chart = new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ label: 'Temp', data: [], borderColor: '#0dcaf0' }] } });

    setInterval(async () => {
        const res = await fetch('/api/monitoramento');
        const data = await res.json();
        document.getElementById('temp').innerText = data.temperatura + "°C (Limite: " + data.limite + "°C)";
        chart.data.labels.push(new Date().toLocaleTimeString());
        chart.data.datasets[0].data.push(data.temperatura);
        if(chart.data.labels.length > 10) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
        chart.update();
    }, 2000);

    async function alterarSetpoint() {
        await fetch('/api/setpoint', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ valor: document.getElementById('val-setpoint').value }) });
        alert("Setpoint Atualizado!");
    }
</script>
</body>
</html>
