<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>HMI SCADA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-dark: #0b0f19; --panel-bg: #151b28; --border-color: #262f40; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .data-value { font-family: 'JetBrains Mono', monospace; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 15px;}
        .chart-container { position: relative; height: 160px; width: 100%; }
        .metric-header { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; font-weight: 600; display: flex; justify-content: space-between; margin-bottom: 10px; }
        
        .estado-alarme { border-color: #ef4444 !important; box-shadow: inset 0 0 20px rgba(239,68,68,0.1) !important; animation: piscar 1.5s infinite;}
        @keyframes piscar { 50% { border-color: #991b1b !important; } }
        .log-terminal { background: #000; border: 1px solid #334155; border-radius: 6px; padding: 10px; height: 150px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #a3e635; }
    </style>
</head>
<body>

<div class="container-fluid px-4 py-3">
    <div class="d-flex justify-content-between mb-3 border-bottom border-secondary pb-2">
        <h5 class="text-info m-0">⚙️ HMI SCADA - Caldeira Multivariável</h5>
        <a href="/logout" class="btn btn-outline-danger btn-sm">Sair</a>
    </div>

    <div class="row g-3">
        <div class="col-md-3">
            <div class="panel border-warning h-100">
                <h6 class="text-warning mb-4">Ajustes de Setpoint (SP)</h6>
                
                <label class="small text-secondary">Temp Máxima (°C)</label>
                <div class="input-group input-group-sm mb-3">
                    <input type="number" id="sp-temp" class="form-control bg-dark text-white border-secondary">
                    <button class="btn btn-warning" onclick="alterarSetpoint('temp', 'sp-temp')">Gravar</button>
                </div>

                <label class="small text-secondary">Pressão Máxima (bar)</label>
                <div class="input-group input-group-sm mb-3">
                    <input type="number" id="sp-pressao" class="form-control bg-dark text-white border-secondary">
                    <button class="btn btn-warning" onclick="alterarSetpoint('pressao', 'sp-pressao')">Gravar</button>
                </div>

                <label class="small text-secondary">Vazão Mínima (L/min)</label>
                <div class="input-group input-group-sm mb-2">
                    <input type="number" id="sp-vazao" class="form-control bg-dark text-white border-secondary">
                    <button class="btn btn-warning" onclick="alterarSetpoint('vazao', 'sp-vazao')">Gravar</button>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="row g-3">
                <div class="col-md-4">
                    <div id="card-temp" class="panel">
                        <div class="metric-header"><span class="text-info">Temperatura</span> <span id="val-lim-temp" class="text-warning small"></span></div>
                        <div class="data-value fs-3 fw-bold mb-1" id="val-temp">--</div>
                        <div class="chart-container"><canvas id="chartTemp"></canvas></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div id="card-pressao" class="panel">
                        <div class="metric-header"><span class="text-primary">Pressão</span> <span id="val-lim-pressao" class="text-warning small"></span></div>
                        <div class="data-value fs-3 fw-bold mb-1 text-primary" id="val-pressao">--</div>
                        <div class="chart-container"><canvas id="chartPressao"></canvas></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div id="card-vazao" class="panel">
                        <div class="metric-header"><span class="text-success">Vazão</span> <span id="val-lim-vazao" class="text-warning small"></span></div>
                        <div class="data-value fs-3 fw-bold mb-1 text-success" id="val-vazao">--</div>
                        <div class="chart-container"><canvas id="chartVazao"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-12">
            <div class="panel">
                <div class="metric-header">CONSOLE DE EVENTOS</div>
                <div id="terminal" class="log-terminal"><div style="color: #38bdf8;">[SISTEMA] Sincronização de Dados Ativa.</div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const opts = { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { grid: { color: '#1e293b' } } }, plugins: { legend: { display: false } } };
    const cTemp = new Chart(document.getElementById('chartTemp').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#0ea5e9', fill: true, tension: 0.3 }] }, options: opts });
    const cPress = new Chart(document.getElementById('chartPressao').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', tension: 0.3 }] }, options: opts });
    const cVazao = new Chart(document.getElementById('chartVazao').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#10b981', tension: 0.3 }] }, options: opts });

    let stateAlarme = { temp: false, pressao: false, vazao: false };

    function log(msg, color) {
        const term = document.getElementById('terminal');
        term.innerHTML += `<div style="color: ${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        term.scrollTop = term.scrollHeight;
    }

    setInterval(async () => {
        const res = await fetch('/api/monitoramento');
        const d = await res.json();
        const t = new Date().toLocaleTimeString();
        
        document.getElementById('val-temp').innerText = d.temp.valor.toFixed(1) + ' °C';
        document.getElementById('val-lim-temp').innerText = 'SP: ' + d.temp.limite;
        document.getElementById('val-pressao').innerText = d.pressao.valor.toFixed(2) + ' bar';
        document.getElementById('val-lim-pressao').innerText = 'SP: ' + d.pressao.limite;
        document.getElementById('val-vazao').innerText = d.vazao.valor.toFixed(1) + ' L/m';
        document.getElementById('val-lim-vazao').innerText = 'SP: ' + d.vazao.limite;

        const handleAlarme = (key, dataObj, cardId, msgAtiva, msgNormal) => {
            if (dataObj.alarme) {
                document.getElementById(cardId).classList.add('estado-alarme');
                if (!stateAlarme[key]) { log(msgAtiva, "#f87171"); stateAlarme[key] = true; }
            } else {
                document.getElementById(cardId).classList.remove('estado-alarme');
                if (stateAlarme[key]) { log(msgNormal, "#a3e635"); stateAlarme[key] = false; }
            }
        };

        handleAlarme('temp', d.temp, 'card-temp', 'ALERTA: Temperatura Alta!', 'Temperatura normalizada.');
        handleAlarme('pressao', d.pressao, 'card-pressao', 'ALERTA: Pressão Alta!', 'Pressão normalizada.');
        handleAlarme('vazao', d.vazao, 'card-vazao', 'ALERTA: Baixa Vazão!', 'Vazão normalizada.');

        [cTemp, cPress, cVazao].forEach((c, i) => {
            c.data.labels.push(t); c.data.datasets[0].data.push([d.temp.valor, d.pressao.valor, d.vazao.valor][i]);
            if(c.data.labels.length > 20) { c.data.labels.shift(); c.data.datasets[0].data.shift(); }
            c.update();
        });
    }, 2000);

    async function alterarSetpoint(varName, inputId) {
        const val = document.getElementById(inputId).value;
        if(!val) return;
        await fetch('/api/setpoint', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ variavel: varName, valor: val }) });
        log(`Você alterou o Setpoint de ${varName.toUpperCase()} para ${val}`, "#38bdf8");
        document.getElementById(inputId).value = '';
    }
</script>
</body>
</html>
