<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SCADA Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #020617; color: #ffffff; font-family: 'Inter', sans-serif; }
        .header { background: #0f172a; border-bottom: 1px solid #1e293b; padding: 15px 30px; }
        .v-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 20px; transition: 0.3s; }
        .val { font-size: 2.2rem; font-weight: 800; color: #fff; margin: 5px 0; }
        .unit { font-size: 0.9rem; color: #64748b; }
        .lbl { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        canvas { max-height: 120px; }
        .alarme-on { border-color: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { background: #0f172a; } 50% { background: #450a0a; } 100% { background: #0f172a; } }
    </style>
</head>
<body>
    <div class="header d-flex justify-content-between align-items-center">
        <h5 class="m-0 fw-bold">SCADA // MÁQUINA_01</h5>
        <div class="d-flex align-items-center">
            <span class="badge bg-primary me-3">MODO OPERADOR</span>
            <a href="/logout" class="btn btn-sm btn-outline-danger">SAIR</a>
        </div>
    </div>

    <div class="container-fluid p-4">
        <div class="row g-3">
            <div class="col-md-3">
                <div id="c-temp" class="v-card">
                    <span class="lbl">Temperatura</span>
                    <div class="val" id="v-temp">-- <span class="unit">°C</span></div>
                    <canvas id="g-temp"></canvas>
                </div>
            </div>
            <div class="col-md-3">
                <div class="v-card">
                    <span class="lbl">Pressão</span>
                    <div class="val" id="v-pres">-- <span class="unit">bar</span></div>
                    <canvas id="g-pres"></canvas>
                </div>
            </div>
            <div class="col-md-3">
                <div class="v-card">
                    <span class="lbl">Vazão</span>
                    <div class="val" id="v-vaz">-- <span class="unit">L/m</span></div>
                    <canvas id="g-vaz"></canvas>
                </div>
            </div>
            <div class="col-md-3">
                <div class="v-card">
                    <span class="lbl">Nível Reservatório</span>
                    <div class="val" id="v-niv">-- <span class="unit">%</span></div>
                    <canvas id="g-niv"></canvas>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="v-card">
                    <span class="lbl">Controle de Alarme</span>
                    <div class="input-group mt-3">
                        <input type="number" id="setp" class="form-control bg-dark border-secondary text-white" placeholder="Limite Temp.">
                        <button class="btn btn-primary" onclick="setar()">SALVAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function createChart(id, color) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: color, borderWidth: 2, fill: false, pointRadius: 0 }] },
                options: { animation: false, scales: { x: {display: false}, y: {display: false} }, plugins: {legend: {display: false}} }
            });
        }
        const charts = {
            temp: createChart('g-temp', '#38bdf8'),
            pres: createChart('g-pres', '#10b981'),
            vaz: createChart('g-vaz', '#f59e0b'),
            niv: createChart('g-niv', '#a855f7')
        };

        async function update() {
            const res = await fetch('/api/scada_data');
            const d = (await res.json()).maquina_01;
            
            document.getElementById('v-temp').innerHTML = `${d.temp}<span class="unit">°C</span>`;
            document.getElementById('v-pres').innerHTML = `${d.pressao}<span class="unit">bar</span>`;
            document.getElementById('v-vaz').innerHTML = `${d.vazao}<span class="unit">L/m</span>`;
            document.getElementById('v-niv').innerHTML = `${d.nivel}<span class="unit">%</span>`;

            if(d.alarme) document.getElementById('c-temp').classList.add('alarme-on');
            else document.getElementById('c-temp').classList.remove('alarme-on');

            const time = new Date().toLocaleTimeString();
            [['temp', d.temp], ['pres', d.pressao], ['vaz', d.vazao], ['niv', d.nivel]].forEach(([k, v]) => {
                charts[k].data.labels.push(time);
                charts[k].data.datasets[0].data.push(v);
                if(charts[k].data.labels.length > 20) { charts[k].data.labels.shift(); charts[k].data.datasets[0].data.shift(); }
                charts[k].update();
            });
        }
        setInterval(update, 2000);
        async function setar() {
            await fetch('/api/setpoint', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({valor: document.getElementById('setp').value}) });
            alert("Limite atualizado!");
        }
    </script>
</body>
</html>
