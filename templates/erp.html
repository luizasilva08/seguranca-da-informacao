<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Enterprise ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #ffffff; font-family: 'Inter', sans-serif; }
        .nav-top { background: #1e293b; padding: 15px; border-bottom: 1px solid #334155; }
        .card-erp { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 25px; height: 100%; }
        .stat-val { font-size: 1.8rem; font-weight: 700; color: #38bdf8; }
        table { color: #fff !important; }
        th { color: #94a3b8; font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="nav-top d-flex justify-content-between">
        <span class="fw-bold">COMMAND CENTER ERP</span>
        <a href="/logout" class="text-danger">Encerrar</a>
    </div>

    <div class="container mt-4">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card-erp">
                    <h6 class="text-muted">Receita Projetada</h6>
                    <div id="rec" class="stat-val">--</div>
                    <hr class="border-secondary">
                    <h6 class="text-muted">Custo Operacional</h6>
                    <div id="custo" class="stat-val text-danger">--</div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card-erp">
                    <h6>Gestão de Inventário Crítico</h6>
                    <table class="table mt-3">
                        <thead><tr><th>Insumo</th><th>Status</th><th>Qtd</th></tr></thead>
                        <tbody id="estoque"></tbody>
                    </table>
                </div>
            </div>

            <div class="col-md-12">
                <div class="card-erp">
                    <h6>Trilha de Auditoria de Segurança</h6>
                    <div id="logs" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function up() {
            const res = await fetch('/api/erp_data');
            const d = await res.json();
            document.getElementById('rec').innerText = d.financeiro.receita;
            document.getElementById('custo').innerText = d.financeiro.custo;

            document.getElementById('estoque').innerHTML = d.estoque.map(i => `
                <tr>
                    <td>${i.item}</td>
                    <td><span class="badge ${i.critico?'bg-danger':'bg-success'}">${i.critico?'CRÍTICO':'OK'}</span></td>
                    <td>${i.qtd}</td>
                </tr>
            `).join('');

            document.getElementById('logs').innerHTML = d.logs.map(l => `
                <div class="d-flex justify-content-between border-bottom border-secondary py-2 small">
                    <span><strong>${l.u}</strong>: ${l.a}</span>
                    <span class="text-muted">${l.d}</span>
                </div>
            `).join('');
        }
        setInterval(up, 5000);
        up();
    </script>
</body>
</html>
