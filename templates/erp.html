<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>ERP | Dashboard Executivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --bg-dark: #0f172a; --panel-bg: #1e293b; --border-color: #334155; }
        body { background-color: var(--bg-dark); color: #f8fafc; font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, p, span, div { color: #f8f9fa; }
        .text-muted { color: #94a3b8 !important; } .text-secondary { color: #cbd5e1 !important; }
        .text-primary { color: #38bdf8 !important; }
        
        .topbar { background: #0f172a; border-bottom: 1px solid var(--border-color); padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; }
        .panel { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .kpi-value { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 700; color: #fff; }
        
        .table-custom { color: #f8f9fa; font-size: 0.85rem; margin: 0; }
        .table-custom th { color: #ffffff; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; border-bottom: 1px solid #475569; }
        .table-custom td { border-bottom: 1px solid #334155; color: #e2e8f0; vertical-align: middle; }
        
        .pdf-export { background-color: #0f172a !important; padding: 20px; }
    </style>
</head>
<body>

<div class="topbar mb-4">
    <div class="fw-bold text-success"><i class="bi bi-buildings me-2"></i>ERP | VISÃO EXECUTIVA</div>
    <div class="d-flex gap-2">
        <button onclick="exportarPDF()" class="btn btn-outline-light btn-sm"><i class="bi bi-file-pdf"></i> PDF</button>
        <button onclick="exportarCSV()" class="btn btn-outline-light btn-sm"><i class="bi bi-file-earmark-spreadsheet"></i> CSV</button>
        <a href="/logout" class="btn btn-outline-danger btn-sm"><i class="bi bi-power"></i> Sair</a>
    </div>
</div>

<div id="conteudo-dashboard" class="container-fluid px-4">
    <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="panel border-bottom border-4 border-info"><div class="text-secondary small fw-bold mb-1">PREVISÃO DE FATURAÇÃO</div><div id="fat" class="kpi-value text-info">--</div></div></div>
        <div class="col-md-4"><div class="panel border-bottom border-4 border-danger"><div class="text-secondary small fw-bold mb-1">CUSTO ENERGÉTICO (HOJE)</div><div id="custo" class="kpi-value text-danger">--</div></div></div>
        <div class="col-md-4"><div class="panel border-bottom border-4 border-warning"><div class="text-secondary small fw-bold mb-1">DESPERDÍCIO ESTIMADO</div><div id="desp" class="kpi-value text-warning">--</div></div></div>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="panel border-success h-100">
                <h6 class="text-success mb-3"><i class="bi bi-box-seam"></i> RASTREABILIDADE</h6>
                <div class="mb-3">
                    <small class="text-secondary">Lote Atual:</small>
                    <h4 id="lote-atual" class="text-white mt-1" style="font-family: 'JetBrains Mono', monospace;">--</h4>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-secondary small">Data Produção:</span>
                    <span id="data-lote" class="text-white small">--/--/----</span>
                </div>
                <button onclick="verificarLote()" class="btn btn-outline-success w-100 btn-sm mt-3">Verificar Assinatura</button>
                <div id="resultado-assinatura" class="mt-3 text-center small text-info"></div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="panel h-100">
                <h6 class="text-secondary mb-3"><i class="bi bi-list-check"></i> AUDITORIA (LOGS)</h6>
                <div style="max-height: 220px; overflow-y: auto;">
                    <table class="table table-custom table-dark table-striped">
                        <thead><tr><th>Hora</th><th>User</th><th>Ação</th></tr></thead>
                        <tbody id="tabela-logs" style="font-family: 'JetBrains Mono', monospace;"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="panel h-100 text-center">
                <h6 class="text-secondary mb-3"><i class="bi bi-shield-lock"></i> SEGURANÇA</h6>
                <div style="height: 120px; margin: 0 auto;"><canvas id="chartSeguranca"></canvas></div>
                <div id="status-seg" class="mt-3 fw-bold fs-4">--/100</div>
                <div class="small mt-2 text-warning">Ataques bloqueados: <span id="falhas" class="fw-bold text-white">0</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    let dadosGlobais = {}; 
    const ctx = document.getElementById('chartSeguranca').getContext('2d');
    const chartRisco = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: ['Score', 'Risco'], datasets: [{ data: [100, 0], backgroundColor: ['#10b981', '#ef4444'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '80%', plugins: { legend: { display: false } } }
    });

    async function atualizarDashboard() {
        const res = await fetch('/api/erp');
        const data = await res.json();
        dadosGlobais = data;
        
        document.getElementById('fat').innerText = data.kpi_financeiro.faturamento;
        document.getElementById('custo').innerText = data.kpi_financeiro.custo_energia;
        document.getElementById('desp').innerText = data.kpi_financeiro.desperdicio;
        document.getElementById('lote-atual').innerText = data.lote_atual;
        document.getElementById('data-lote').innerText = data.data_lote;
        document.getElementById('falhas').innerText = data.falhas_login;
        document.getElementById('status-seg').innerText = data.seguranca_score + " / 100";

        chartRisco.data.datasets[0].data = [data.seguranca_score, 100 - data.seguranca_score];
        chartRisco.update();

        document.getElementById('tabela-logs').innerHTML = data.logs.map(l => `
            <tr><td class="text-muted">${l.data}</td><td class="text-primary">${l.usuario}</td><td>${l.acao}</td></tr>
        `).join('');
    }

    setInterval(atualizarDashboard, 4000);
    atualizarDashboard();


    function exportarPDF() {
        const elemento = document.getElementById('conteudo-dashboard');
        const opt = {
            margin: 10,
            filename: 'Relatorio_Executivo_ERP.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: '#0f172a' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(elemento).save();
    }

    function exportarCSV() {
        if (!dadosGlobais.logs) return;
        
        let csv = "\ufeff"; // BOM para acentuação no Excel
        csv += "RELATORIO EXECUTIVO - NEXUS UI\n";
        csv += `Data:;${new Date().toLocaleString()}\n\n`;
        csv += "INDICADORES;\n";
        csv += `Faturacao:;${dadosGlobais.kpi_financeiro.faturamento}\n`;
        csv += `Seguranca:;${dadosGlobais.seguranca_score}/100\n\n`;
        csv += "LOGS DE AUDITORIA;\n";
        csv += "Hora;Utilizador;Acao\n";
        
        dadosGlobais.logs.forEach(l => {
            csv += `${l.data};${l.usuario};${l.acao}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Relatorio_ERP.csv";
        link.click();
    }

    async function verificarLote() {
        const btn = document.getElementById('resultado-assinatura');
        btn.innerText = "A verificar...";
        const res = await fetch('/api/verificar_lote', { method: 'POST' });
        const data = await res.json();
        btn.innerHTML = `<span class="text-success">STATUS: ${data.status}</span>`;
    }
</script>
</body>
</html>
