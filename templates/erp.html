<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nexus ERP | Corporate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #ffffff; font-family: 'Inter', sans-serif; }
        .nav-top { background: #1e293b; border-bottom: 1px solid #334155; padding: 15px 40px; }
        .erp-card { background: #0f172a; border: 1px solid #334155; border-radius: 16px; padding: 30px; }
        .money-val { font-size: 2rem; font-weight: 700; color: #ffffff; }
        .table { color: #ffffff !important; }
        .table th { color: #64748b; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #334155; }
        .table td { border-bottom: 1px solid #1e293b; padding: 15px 0; }
    </style>
</head>
<body>
    <div class="nav-top d-flex justify-content-between align-items-center">
        <h5 class="m-0 fw-bold">NEXUS <span class="text-primary">ERP</span></h5>
        <div class="d-flex gap-4">
            <span class="text-secondary small">LOGGED AS: <strong>ENGINEERING_ADMIN</strong></span>
            <a href="/logout" class="text-danger small fw-bold text-decoration-none">EXIT</a>
        </div>
    </div>

    <div class="container mt-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="erp-card border-start border-4 border-primary">
                    <span class="text-secondary small fw-bold">FATURAMENTO BRUTO</span>
                    <div class="money-val mb-4" id="v-rec">R$ 0,00</div>
                    
                    <span class="text-secondary small fw-bold">CUSTO OPERACIONAL</span>
                    <div class="money-val text-danger" id="v-custo">R$ 0,00</div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="erp-card">
                    <h6 class="fw-bold mb-4">GARGALOS DE SUPRIMENTOS & MATÉRIA-PRIMA</h6>
                    <table class="table">
                        <thead><tr><th>RECURSO</th><th>SALDO ATUAL</th><th>RECOMENDAÇÃO</th></tr></thead>
                        <tbody id="v-estoque"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function update() {
            const res = await fetch('/api/erp_data');
            const d = await res.json();
            
            document.getElementById('v-rec').innerText = d.financeiro.receita;
            document.getElementById('v-custo').innerText = d.financeiro.custo;

            document.getElementById('v-estoque').innerHTML = d.estoque.map(i => `
                <tr>
                    <td class="fw-bold text-white">${i.item}</td>
                    <td>${i.qtd}</td>
                    <td><span class="badge bg-${i.cor}">${i.acao}</span></td>
                </tr>
            `).join('');
        }
        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
