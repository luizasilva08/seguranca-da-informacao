<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ERP - Corporativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #0d1117; color: white; } .card { background-color: #161b22; border: 1px solid #30363d; }</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand text-success">ERP - Visão Global & Auditoria</span>
        <div>
            <span class="navbar-text me-3 text-success">Engenharia</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Sair</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-6">
            <div class="card p-4 border-success mb-3">
                <h4 class="text-success">Dashboard Financeiro</h4><hr>
                <p>Custo Diário (Energia/Gás): <strong id="custo" class="text-danger">--</strong></p>
                <p>Previsão Faturamento: <strong id="fat" class="text-info">--</strong></p>
                <p>Estoque Atual de Inox: <strong id="estoque">--</strong></p>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4 border-danger">
                <h4 class="text-danger">Auditoria do Sistema (Logs)</h4><hr>
                <div id="lista-logs" style="font-size:0.85rem; height: 130px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    setInterval(async () => {
        const res = await fetch('/api/erp');
        const data = await res.json();
        
        document.getElementById('custo').innerText = data.custo_energia_diario;
        document.getElementById('fat').innerText = data.previsao_faturamento;
        document.getElementById('estoque').innerText = data.estoque_materia_prima;
        
        const logsContainer = document.getElementById('lista-logs');
        logsContainer.innerHTML = data.logs.map(l => `<div><span class="text-info">[${l.data}]</span> <strong>${l.usuario}</strong> - ${l.acao}</div>`).join('');
    }, 4000);
</script>
</body>
</html>
