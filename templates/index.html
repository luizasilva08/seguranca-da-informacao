<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SCADA Pro - Industrial Security</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0d1117; color: #ffffff; } /* Fundo escuro, texto branco */
        .card { background-color: #161b22; border: 1px solid #30363d; color: white; }
        .text-muted { color: #8b949e !important; }
        .hidden { display: none !important; }
        
        /* Animação de Alarme Crítico */
        @keyframes flash-red {
            0% { background-color: #161b22; }
            50% { background-color: #7a0000; }
            100% { background-color: #161b22; }
        }
        .alarme-ativo {
            animation: flash-red 0.8s infinite;
            border: 2px solid #ff0000 !important;
        }
        
        label { color: white; font-weight: bold; }
        .log-item { font-size: 0.85rem; border-bottom: 1px solid #30363d; padding: 5px; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div id="login-section" class="row justify-content-center mt-5">
        <div class="col-md-4 card p-4">
            <h3 class="text-center text-info">Acesso Restrito</h3>
            <div class="mt-3">
                <label>Usuário</label>
                <input type="text" id="user" class="form-control bg-dark text-white border-secondary">
            </div>
            <div class="mt-3">
                <label>Senha</label>
                <input type="password" id="pass" class="form-control bg-dark text-white border-secondary">
            </div>
            <button class="btn btn-info w-100 mt-4" onclick="fazerLogin()">Entrar</button>
            <p id="msg-erro" class="text-danger mt-2 text-center"></p>
        </div>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="d-flex justify-content-between mb-4">
            <h2>SCADA <span class="text-info" id="user-role"></span></h2>
            <button class="btn btn-outline-light btn-sm" onclick="location.reload()">Sair</button>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div id="status-card" class="card p-3 mb-4">
                    <div class="d-flex justify-content-between">
                        <h4 id="txt-monitoramento">Monitoramento de Temperatura</h4>
                        <span id="badge-alarme" class="badge bg-success">SISTEMA OK</span>
                    </div>
                    <hr>
                    <div class="row text-center">
                        <div class="col-6">
                            <p class="text-muted mb-0">ATUAL</p>
                            <h1 id="display-temp">-- °C</h1>
                        </div>
                        <div class="col-6">
                            <p class="text-muted mb-0">LIMITE SETPOINT</p>
                            <h1 id="display-limite" class="text-info">-- °C</h1>
                        </div>
                    </div>
                    <canvas id="grafico" height="100"></canvas>
                </div>
            </div>

            <div class="col-md-4">
                <div id="painel-supervisor" class="card p-3 mb-3 hidden">
                    <h5 class="text-warning">Ajustar Alarme</h5>
                    <div class="input-group">
                        <input type="number" id="val-setpoint" class="form-control bg-dark text-white">
                        <button class="btn btn-warning" onclick="alterarSetpoint()">Aplicar</button>
                    </div>
                </div>

                <div id="painel-engenharia" class="card p-3 hidden">
                    <h5 class="text-danger">Auditoria (Quem/Quando/Onde)</h5>
                    <div id="lista-logs" style="max-height: 300px; overflow-y: auto;">
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let chart;
    function iniciarGrafico() {
        const ctx = document.getElementById('grafico').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Temp', data: [], borderColor: '#0dcaf0', fill: true, backgroundColor: 'rgba(13, 202, 240, 0.1)' }] },
            options: { animation: false, scales: { y: { suggestedMin: 175, suggestedMax: 195 } } }
        });
    }

    async function fazerLogin() {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value })
        });
        const data = await res.json();
        if(res.ok) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('user-role').innerText = data.role;
            if(data.role !== 'Operador') document.getElementById('painel-supervisor').classList.remove('hidden');
            if(data.role === 'Engenharia') {
                document.getElementById('painel-engenharia').classList.remove('hidden');
                setInterval(carregarLogs, 5000);
            }
            iniciarGrafico();
            setInterval(atualizarDados, 2000);
        } else { document.getElementById('msg-erro').innerText = data.erro; }
    }

    async function atualizarDados() {
        const res = await fetch('/api/monitoramento');
        const data = await res.json();
        
        document.getElementById('display-temp').innerText = data.temperatura + " °C";
        document.getElementById('display-limite').innerText = data.limite + " °C";

        // LÓGICA DE ALARME VISUAL
        const card = document.getElementById('status-card');
        const badge = document.getElementById('badge-alarme');
        if(data.alarme) {
            card.classList.add('alarme-ativo');
            badge.innerText = "ALERTA: TEMPERATURA ALTA!";
            badge.className = "badge bg-danger";
        } else {
            card.classList.remove('alarme-ativo');
            badge.innerText = "SISTEMA OK";
            badge.className = "badge bg-success";
        }

        // Gráfico
        const hora = new Date().toLocaleTimeString();
        chart.data.labels.push(hora);
        chart.data.datasets[0].data.push(data.temperatura);
        if(chart.data.labels.length > 10) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
        chart.update();
    }

    async function alterarSetpoint() {
        const valor = document.getElementById('val-setpoint').value;
        await fetch('/api/setpoint', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ valor: valor })
        });
        alert("Setpoint de Alarme Atualizado!");
    }

    async function carregarLogs() {
        const res = await fetch('/api/auditoria');
        const logs = await res.json();
        const container = document.getElementById('lista-logs');
        container.innerHTML = '';
        logs.forEach(l => {
            container.innerHTML += `
                <div class="log-item">
                    <span class="text-info">[${l.data}]</span> <strong>${l.usuario}</strong><br>
                    <span>${l.acao}</span> <br>
                    <small class="text-muted">IP: ${l.ip}</small>
                </div>`;
        });
    }
</script>
</body>
</html>
